<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathiverse | Your All-in-One Math Universe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1e3f 0%, #0a0a0f 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .math-gradient {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed w-full z-50 glass border-t-0 border-x-0">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div class="text-2xl font-extrabold tracking-tighter uppercase">Math<span class="text-indigo-500">iverse</span></div>
            <div class="space-x-6 hidden md:flex items-center text-sm font-medium">
                <a href="#graph-section" class="hover:text-indigo-400 transition">Grapher</a>
                <a href="#features" class="hover:text-indigo-400 transition">Tools</a>
                <a href="#resources" class="hover:text-indigo-400 transition">Resources</a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-10 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-extrabold mt-6 leading-tight">
                Explore the <span class="math-gradient">Math Universe</span>
            </h1>
            <p class="text-gray-400 text-lg mt-6 max-w-xl mx-auto">
                Interactive graphing and calculations, all in one place.
            </p>
        </div>
    </header>

    <section id="graph-section" class="max-w-6xl mx-auto px-6 pb-24">
        <div class="glass p-2 rounded-[2rem] border-indigo-500/20 shadow-2xl overflow-hidden">
            <div id="calculator" style="width: 100%; height: 500px; background: #1a1a2e; display: flex; align-items: center; justify-content: center;">
                <p class="text-indigo-400 animate-pulse">Initializing Graph Engine...</p>
            </div>
        </div>
    </section>

    <section id="features" class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass p-10 rounded-3xl">
                <h3 class="text-2xl font-bold mb-4">Calculus</h3>
                <p class="text-gray-400 text-sm">Derivatives and integrals visualization.</p>
            </div>
            <div class="glass p-10 rounded-3xl">
                <h3 class="text-2xl font-bold mb-4">Matrices</h3>
                <p class="text-gray-400 text-sm">Linear algebra tools and solvers.</p>
            </div>
            <div class="glass p-10 rounded-3xl">
                <h3 class="text-2xl font-bold mb-4">Stats</h3>
                <p class="text-gray-400 text-sm">Probability and data distribution tools.</p>
            </div>
        </div>
    </section>

    <script>
        window.onload = function() {
            const elt = document.getElementById('calculator');
            
            if (typeof Desmos !== 'undefined') {
                // Clear the loading message
                elt.innerHTML = "";
                
                const calculator = Desmos.GraphingCalculator(elt, {
                    keypad: true,
                    expressions: true,
                    settingsMenu: true,
                    zoomButtons: true,
                    autosize: true
                });
                
                // Add a sample graph
                calculator.setExpression({ id: 'graph1', latex: 'y=x^2', color: '#6366f1' });
            } else {
                elt.innerHTML = "<p class='text-red-400'>Error: Could not load the graphing engine. Please check your connection.</p>";
            }
        };
    </script>

</body>
</html>
